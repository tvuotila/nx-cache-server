name: Lint, Test and Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
  release:
    types: [published]
  pull_request:
    branches:
      - 'main'

jobs:
  checks:
    name: Main Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.14
      - name: Run lint
        run: deno lint
      - name: Run format check
        run: deno fmt --check
  e2e:
    name: Test Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.14
      - name: Run tests
        run: |
          deno task test
          deno task e2e
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: helm lint
        run: helm lint charts/nx-cache-server
      - name: helm template smoke test
        run: |
          helm template test charts/nx-cache-server \
            --set secrets.nxCacheAccessToken=token \
            --set config.s3.endpointUrl=http://localhost:4566 \
            > /dev/null
  publish:
    runs-on: ubuntu-latest
    needs:
      - e2e
      - checks
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: tvuotila/nx-cache-server
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: |
            linux/amd64
            linux/arm64/v8
  helm-publish:
    name: Publish Helm Chart
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs:
      - checks
      - e2e
      - helm-lint
      - publish
    permissions:
      contents: read
      packages: write
    env:
      CHART_DIR: charts/nx-cache-server
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Derive version from release tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package chart
        run: |
          helm package "$CHART_DIR" \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}"
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push chart to GHCR
        run: helm push "nx-cache-server-${{ steps.ver.outputs.version }}.tgz" oci://ghcr.io/tvuotila/charts
